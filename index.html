<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#203323">
  <meta name="description" content="spikepvp.org - Multiplayer 2D fighting game.">
  <meta property="og:type" content="website">
  <meta property="og:site_name" content="spikepvp.org">
  <meta property="og:title" content="spikepvp.org">
  <meta property="og:description" content="spikepvp.org - Multiplayer 2D fighting game.">
  <meta property="og:url" content="https://spikepvp.org/">
  <meta property="og:image" content="https://spikepvp.org/sprites/resources/gold.png">
  <meta name="twitter:card" content="summary">
  <meta name="twitter:title" content="spikepvp.org">
  <meta name="twitter:description" content="spikepvp.org - Multiplayer 2D fighting game.">
  <meta name="twitter:image" content="https://spikepvp.org/sprites/resources/gold.png">
  <link rel="canonical" href="https://spikepvp.org/">
  <title>spikepvp.org</title>
  <link rel="icon" type="image/png" href="sprites/resources/gold.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Baloo+Paaji+2:wght@400;500;600;700;800&amp;display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <canvas id="gameCanvas" aria-label="spikepvp.org game canvas"></canvas>

  <main id="lobby" class="lobby-layer">
    <section class="lobby-card" aria-labelledby="gameTitle">
      <h1 id="gameTitle">spikepvp.org</h1>

      <label class="field-label" for="nickname">Nickname</label>
      <input id="nickname" class="text-field" maxlength="20" autocomplete="nickname" placeholder="Enter a nickname">

      <label class="field-label server-label" for="serverPreset">Server</label>
      <select id="serverPreset" class="text-field">
        <option value="frankfurt">Frankfurt</option>
        <option value="local">Local server</option>
      </select>

      <p id="joinError" class="form-error" role="alert"></p>
      <div class="lobby-actions">
        <button id="joinButton" class="primary-button" type="button">Play</button>
        <button id="lobbySettingsButton" class="lobby-settings-button" type="button">Settings</button>
      </div>
    </section>
  </main>

  <section id="hud" class="hud" hidden>
    <div class="hud-top-left">
      <div class="hud-button-row">
        <button id="settingsButton" class="hud-button" type="button" title="Settings">
          Settings
        </button>
        <button id="clanButton" class="hud-button" type="button" title="Clan">
          Clan
        </button>
        <button id="helmetsButton" class="hud-button" type="button" title="Hats">
          Hats
        </button>
      </div>
      <div id="clanRequestPopups" class="request-popups"></div>
    </div>

    <div class="hud-top-right">
      <aside id="leaderboard" class="leaderboard-panel">
        <header><b>LEADERBOARD</b></header>
        <ol id="leaderboardRows"></ol>
      </aside>
      <aside id="killPanel" class="kill-panel" aria-label="Kills">
        <span class="kill-icon" aria-hidden="true">⚔️</span>
        <span id="killCount">0</span>
        <small>kills</small>
      </aside>
      <div id="pingDisplay" class="ping-display" hidden>— fps, — tps, — ms</div>
    </div>

    <aside id="resourcePanel" class="resource-panel" aria-label="Resources">
      <div><img src="sprites/resources/tree.png" alt=""><span id="treeCount" class="resource-value" data-resource="tree">0</span><small>tree</small></div>
      <div><img src="sprites/resources/stone.png" alt=""><span id="stoneCount" class="resource-value" data-resource="stone">0</span><small>stone</small></div>
      <div><img src="sprites/resources/gold.png" alt=""><span id="goldCount" class="resource-value" data-resource="gold">0</span><small>gold</small></div>
      <div><img src="sprites/resources/bush.png" alt=""><span id="bushCount" class="resource-value" data-resource="bush">0</span><small>bush</small></div>
    </aside>

    <aside id="minimapPanel" class="minimap-panel" aria-label="Minimap">
      <canvas id="minimapCanvas" width="180" height="180"></canvas>
    </aside>

    <div id="inventory" class="inventory" aria-label="Inventory"></div>
    <div id="inventoryCostPreview" class="inventory-cost-preview" hidden></div>

    <div id="chatComposer" class="chat-composer" hidden>
      <input id="chatInput" maxlength="50" autocomplete="off" placeholder="Message everyone…">
      <span id="chatCounter">0/50</span>
    </div>
  </section>

  <div id="modalShade" class="modal-shade" hidden></div>

  <section id="clanModal" class="game-modal" hidden aria-labelledby="clanModalTitle">
    <header class="modal-header">
      <div>
        <h2 id="clanModalTitle">Clans</h2>
      </div>
      <button class="close-button" data-close-modal type="button" aria-label="Close">×</button>
    </header>
    <div id="clanModalBody" class="modal-body"></div>
  </section>

  <section id="helmetsModal" class="game-modal helmets-modal" hidden aria-labelledby="helmetsModalTitle">
    <header class="modal-header">
      <div>
        <h2 id="helmetsModalTitle">Hats</h2>
      </div>
      <button class="close-button" data-close-modal type="button" aria-label="Close">×</button>
    </header>
    <div id="helmetsModalBody" class="modal-body helmets-list"></div>
  </section>

  <section id="settingsModal" class="game-modal settings-modal" hidden aria-labelledby="settingsModalTitle">
    <header class="modal-header">
      <div>
        <h2 id="settingsModalTitle">Settings</h2>
      </div>
      <button class="close-button" data-close-modal type="button" aria-label="Close">×</button>
    </header>
    <div class="modal-body">
      <div class="setting-toggles">
        <label><span><b>Show FPS, TPS and ms</b></span><input id="showPingSetting" type="checkbox"></label>
        <label><span><b>Show hitboxes</b></span><input id="showHitboxesSetting" type="checkbox"></label>
        <label><span><b>Render grid</b></span><input id="renderGridSetting" type="checkbox"></label>
      </div>
      <div class="settings-divider"><span>Hotkeys</span></div>
      <p class="settings-note">Click a key and choose its replacement.</p>
      <div id="hotkeyRows" class="hotkey-rows"></div>
      <button id="resetHotkeysButton" class="quiet-button full" type="button">Restore defaults</button>
    </div>
  </section>

  <div id="toastStack" class="toast-stack" aria-live="polite"></div>
